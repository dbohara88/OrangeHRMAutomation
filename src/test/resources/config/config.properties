# Framework Configuration File
# Purpose: Stores all environment-specific values outside Java code for easy maintenance.

# Application under test
base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
environment=QA

# Default browser used when no TestNG parameter or command-line override is provided
browser=chrome

# Headless mode is useful for CI servers and remote agents without a visible desktop session
headless=true

# Timeouts are stored here so they can be tuned without recompiling code
explicit.wait=20
page.load.timeout=30

# Real OrangeHRM demo credentials
app.valid.username=Admin
app.valid.password=admin123

# Tutorial-friendly alias values used in the Excel sheet for the successful data row
sample.valid.username=valid_user@test.com
sample.valid.password=Pass@123
